<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sachsentrance – Supporter Datenbank</title>
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #c8ff00;
    --text: #e8e8e8;
    --muted: #777;
    --error: #ff4d4d;
    --success: #4cff8f;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: Arial, sans-serif; min-height: 100vh; }

  header {
    background: var(--surface);
    border-bottom: 2px solid var(--accent);
    padding: 16px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    flex-wrap: wrap;
  }
  .logo { height: 38px; width: 38px; object-fit: contain; border-radius: 4px; }
  header h1 { font-size: 1.2rem; font-weight: 900; letter-spacing: 0.15em; text-transform: uppercase; color: var(--accent); }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .add-btn {
    background: var(--accent);
    color: #000;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 0.82rem;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    text-decoration: none;
    display: inline-block;
    transition: background 0.15s;
  }
  .add-btn:hover { background: #d9ff33; }
  .sync-info { font-size: 0.72rem; color: var(--muted); }

  .layout { display: flex; min-height: calc(100vh - 60px); }

  .sidebar {
    width: 230px;
    min-width: 230px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 18px 14px;
    overflow-y: auto;
  }

  .search-input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 9px 12px;
    color: var(--text);
    font-size: 0.85rem;
    margin-bottom: 20px;
    outline: none;
  }
  .search-input:focus { border-color: var(--accent); }
  .search-input::placeholder { color: var(--muted); }

  .filter-label { font-size: 0.68rem; text-transform: uppercase; letter-spacing: 0.12em; color: var(--muted); font-weight: 700; margin-bottom: 8px; }

  .city-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 20px; }
  .city-btn { font-size: 0.75rem; padding: 4px 9px; border-radius: 4px; border: 1px solid var(--border); background: var(--surface2); cursor: pointer; color: #aaa; transition: all 0.12s; }
  .city-btn:hover { border-color: #666; color: var(--text); }
  .city-btn.active { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }

  .skill-rows { display: flex; flex-direction: column; gap: 2px; margin-bottom: 16px; }
  .skill-row { display: flex; align-items: center; gap: 8px; padding: 5px 6px; border-radius: 4px; cursor: pointer; transition: background 0.1s; }
  .skill-row:hover { background: var(--surface2); }
  .skill-row input { accent-color: var(--accent); cursor: pointer; }
  .skill-row label { font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .skill-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }

  .reset-btn { width: 100%; padding: 7px; border: 1px solid var(--border); border-radius: 5px; background: transparent; font-size: 0.78rem; color: var(--muted); cursor: pointer; transition: all 0.12s; }
  .reset-btn:hover { border-color: #c00; color: #c00; }

  .content { flex: 1; padding: 20px 24px; overflow-y: auto; }
  .result-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
  .result-count { font-size: 0.82rem; color: var(--muted); }
  .result-count strong { color: var(--accent); font-size: 1rem; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 12px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 14px; transition: border-color 0.12s; position: relative; }
  .card:hover { border-color: var(--accent); }
  .card:hover .edit-btn { opacity: 1; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 8px; }
  .card-name { font-weight: 700; font-size: 0.92rem; }
  .card-alias { font-weight: 400; font-size: 0.78rem; color: var(--muted); }
  .city-badges { display: flex; flex-wrap: wrap; gap: 3px; }
  .city-badge { font-size: 0.68rem; color: var(--muted); background: var(--surface2); padding: 2px 7px; border-radius: 10px; white-space: nowrap; }

  .card-skills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 10px; }
  .skill-tag { font-size: 0.67rem; padding: 2px 7px; border-radius: 3px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }

  .card-contacts { display: flex; flex-direction: column; gap: 3px; }
  .contact-item { font-size: 0.78rem; color: var(--muted); }
  .contact-item a { color: var(--accent); text-decoration: none; }
  .contact-item a:hover { text-decoration: underline; }

  .edit-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.68rem;
    padding: 3px 8px;
    border-radius: 5px;
    cursor: pointer;
    opacity: 0;
    transition: all 0.12s;
  }
  .edit-btn:hover { border-color: var(--accent); color: var(--accent); }

  .loading { grid-column: 1/-1; display: flex; flex-direction: column; align-items: center; gap: 16px; padding: 80px; color: var(--muted); font-size: 0.9rem; }
  .spinner { width: 32px; height: 32px; border: 3px solid #222; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty { grid-column: 1/-1; text-align: center; padding: 60px; color: var(--muted); }

  /* Edit modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 100;
    align-items: flex-start;
    justify-content: center;
    overflow-y: auto;
    padding: 40px 16px;
  }
  .modal-overlay.open { display: flex; }
  .modal-box {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    max-width: 620px;
    width: 100%;
    padding: 24px;
  }
  .modal-title { font-size: 1.05rem; font-weight: 900; margin-bottom: 18px; letter-spacing: 0.04em; }
  .modal-section-title {
    font-size: 0.72rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--muted);
    font-weight: 700;
    margin: 18px 0 12px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .modal-field { margin-bottom: 14px; }
  .modal-field label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 5px; }
  .modal-field input[type=text], .modal-field input[type=tel], .modal-field input[type=email], .modal-field textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 0.88rem;
    outline: none;
  }
  .modal-field input:focus, .modal-field textarea:focus { border-color: var(--accent); }
  .modal-field textarea { resize: vertical; min-height: 70px; font-family: inherit; }
  .modal-ueberall { display: flex; align-items: center; gap: 8px; margin-top: 8px; cursor: pointer; font-size: 0.8rem; color: var(--muted); }
  .modal-ueberall input { accent-color: var(--accent); cursor: pointer; }

  .modal-skills-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 7px; }
  .modal-skill-card {
    border: 1px solid var(--border);
    border-radius: 7px;
    padding: 8px 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 8px;
    user-select: none;
    font-size: 0.8rem;
    font-weight: 600;
  }
  .modal-skill-card.selected { border-color: var(--accent); background: #1f2600; }
  .modal-skill-card input { display: none; }

  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .modal-btn { flex: 1; padding: 12px; border-radius: 8px; font-size: 0.88rem; font-weight: 900; text-transform: uppercase; letter-spacing: 0.06em; cursor: pointer; border: none; }
  .modal-btn.save { background: var(--accent); color: #000; }
  .modal-btn.save:hover { background: #d9ff33; }
  .modal-btn.save:disabled { background: #444; color: #888; cursor: not-allowed; }
  .modal-btn.cancel { background: transparent; border: 1px solid var(--border); color: var(--muted); }
  .modal-btn.cancel:hover { border-color: #c00; color: #c00; }
  .modal-msg { font-size: 0.85rem; margin-top: 12px; text-align: center; padding: 10px; border-radius: 6px; display: none; }
  .modal-msg.success { background: #0d2e1a; border: 1px solid var(--success); color: var(--success); display: block; }
  .modal-msg.error { background: #2e0d0d; border: 1px solid var(--error); color: var(--error); display: block; }
</style>
</head>
<body>

<header>
  <img src="Sachsentrance Logo - original.png" alt="Sachsentrance" class="logo">
  <h1>Sachsentrance · Supporter</h1>
  <div class="header-right">
    <span class="sync-info" id="syncInfo">Lade…</span>
    <a class="add-btn" href="form.html">+ Person eintragen</a>
  </div>
</header>

<div class="layout">
  <aside class="sidebar">
    <input class="search-input" id="searchInput" type="text" placeholder="Name suchen…" oninput="render()">
    <div class="filter-label">Stadt</div>
    <div class="city-btns" id="cityBtns"></div>
    <div class="filter-label">Skills</div>
    <div class="skill-rows" id="skillRows"></div>
    <button class="reset-btn" onclick="resetFilters()">✕ Filter zurücksetzen</button>
  </aside>

  <div class="content">
    <div class="result-bar">
      <div class="result-count">Gefunden: <strong id="count">–</strong> Personen</div>
    </div>
    <div class="cards" id="cards">
      <div class="loading"><div class="spinner"></div>Daten werden geladen…</div>
    </div>
  </div>
</div>

<!-- Edit-Modal -->
<div class="modal-overlay" id="editOverlay">
  <div class="modal-box">
    <div class="modal-title" id="editTitle">Person bearbeiten</div>

    <div class="modal-section-title">Persönliche Daten</div>
    <div class="modal-field">
      <label>Name <span style="color:var(--accent)">*</span></label>
      <input type="text" id="e_name">
    </div>
    <div class="modal-field">
      <label>Alias / Spitzname</label>
      <input type="text" id="e_alias">
    </div>
    <div class="modal-field">
      <label>Stadt(städte)</label>
      <input type="text" id="e_staedte" placeholder="z.B. Leipzig oder Leipzig, Berlin">
      <label class="modal-ueberall">
        <input type="checkbox" id="e_ueberall" onchange="toggleEditUeberall(this)">
        Überall verfügbar (kein fester Wohnort)
      </label>
    </div>

    <div class="modal-section-title">Kontakt</div>
    <div class="modal-field">
      <label>Handy / Telegram</label>
      <input type="tel" id="e_handy" placeholder="+49 …">
    </div>
    <div class="modal-field">
      <label>Email</label>
      <input type="email" id="e_email">
    </div>
    <div class="modal-field">
      <label>Instagram / Social</label>
      <input type="text" id="e_social">
    </div>

    <div class="modal-section-title">Skills — was kann / mag die Person machen?</div>
    <div class="modal-skills-grid" id="editSkillsGrid"></div>

    <div class="modal-section-title">Notizen</div>
    <div class="modal-field">
      <textarea id="e_notizen"></textarea>
    </div>

    <div class="modal-actions">
      <button class="modal-btn cancel" onclick="closeEdit()">Abbrechen</button>
      <button class="modal-btn save" id="editSaveBtn" onclick="saveEdit()">Speichern</button>
    </div>
    <div class="modal-msg" id="editMsg"></div>
  </div>
</div>

<script>
// ── KONFIGURATION ──────────────────────────────────────────────────────────────
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzPwRfy-xHjRtU5Ma9IZY2B07QDLF5pKjSCrsxGCUNuQq9z7DXc1JzRPkv83Eihj-xYAQ/exec';
// ─────────────────────────────────────────────────────────────────────────────

const SKILLS = [
  { id: 'Awareness',    label: 'Awareness',     color: '#7c3aed', bg: '#2d1f4a' },
  { id: 'Kasse',        label: 'Kasse',          color: '#0891b2', bg: '#0c2a33' },
  { id: 'Security',     label: 'Security',       color: '#dc2626', bg: '#3a1010' },
  { id: 'Abendleitung', label: 'Abendleitung',   color: '#d97706', bg: '#332208' },
  { id: 'Aufbau/Abbau', label: 'Aufbau/Abbau',   color: '#65a30d', bg: '#1e2c07' },
  { id: 'DJ',           label: 'DJ',             color: '#c8ff00', bg: '#2a3300' },
  { id: 'Licht',        label: 'Licht',          color: '#f59e0b', bg: '#332508' },
  { id: 'Ton',          label: 'Ton',            color: '#06b6d4', bg: '#072830' },
  { id: 'Grafik',       label: 'Grafik',         color: '#ec4899', bg: '#33102a' },
  { id: 'Foto',         label: 'Foto',           color: '#8b5cf6', bg: '#261040' },
  { id: 'Video',        label: 'Video/Film',      color: '#f97316', bg: '#331a00' },
  { id: 'Producer',     label: 'Producer',        color: '#a855f7', bg: '#2d1040' },
];
const ALL_SKILL_IDS = SKILLS.map(s => s.id);
const SKILL_MAP = Object.fromEntries(SKILLS.map(s => [s.id, s]));

// Spalten, die es im Sheet gibt, aber die diese Oberfläche nicht anzeigt/bearbeitet.
// Werden beim Speichern unverändert aus den Rohdaten übernommen, damit nichts verloren geht.
const PASSTHROUGH_COLS = ['Bar/Gastro', 'Catering/Essen'];

let people = [];
let activeCity = 'alle';
let activeSkills = new Set();
let editingRaw = null; // rohe Sheet-Daten der Person, die gerade bearbeitet wird

// ── Load data from Apps Script ────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch(APPS_SCRIPT_URL, { redirect: 'follow' });
    const raw = await res.json();

    // Map sheet rows → people objects
    return raw
      .filter(r => r['Name'] && r['Name'].trim())
      .map(r => ({
        raw: r,
        row: r._row,
        name:   r['Name'].trim(),
        alias:  (r['Alias'] || '').trim(),
        cities: (r['Städte'] || '').toLowerCase() === 'überall'
          ? ['überall']
          : (r['Städte'] || '').split(',').map(c => c.trim()).filter(Boolean),
        handy:  (r['Handy'] || '').replace(/\s+/g,''),
        email:  (r['Email'] || '').trim(),
        social: (r['Social'] || '').trim(),
        skills: ALL_SKILL_IDS.filter(s => (r[s] || '').toLowerCase() === 'ja'),
        notizen: (r['Notizen'] || '').trim(),
      }));
  } catch (err) {
    document.getElementById('syncInfo').textContent = '⚠ Verbindungsfehler';
    console.error(err);
    return [];
  }
}

// ── Build sidebar filters ─────────────────────────────────────────────────────
function buildFilters() {
  const allCities = ['alle', ...Array.from(new Set(people.flatMap(p => p.cities))).sort(), 'unbekannt'];

  const cb = document.getElementById('cityBtns');
  cb.innerHTML = '';
  allCities.forEach(city => {
    const btn = document.createElement('button');
    btn.className = 'city-btn' + (city === activeCity ? ' active' : '');
    btn.textContent = city === 'alle' ? 'Alle' : city;
    btn.onclick = () => {
      activeCity = city;
      document.querySelectorAll('.city-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
    cb.appendChild(btn);
  });

  const sr = document.getElementById('skillRows');
  sr.innerHTML = '';
  SKILLS.forEach(skill => {
    const div = document.createElement('div');
    div.className = 'skill-row';
    div.innerHTML = `<input type="checkbox" id="sk_${skill.id}" ${activeSkills.has(skill.id) ? 'checked' : ''} onchange="toggleSkill('${skill.id}')">
      <label for="sk_${skill.id}"><span class="skill-dot" style="background:${skill.color}"></span>${skill.label}</label>`;
    sr.appendChild(div);
  });
}

function toggleSkill(id) {
  if (activeSkills.has(id)) activeSkills.delete(id); else activeSkills.add(id);
  render();
}
function resetFilters() {
  activeCity = 'alle';
  activeSkills.clear();
  document.getElementById('searchInput').value = '';
  buildFilters();
  render();
}

function matches(p) {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (q && !p.name.toLowerCase().includes(q) && !p.alias.toLowerCase().includes(q)) return false;
  if (activeCity === 'unbekannt' && p.cities.length > 0) return false;
  if (activeCity !== 'alle' && activeCity !== 'unbekannt' && !p.cities.includes(activeCity) && !p.cities.includes('überall')) return false;
  if (activeSkills.size > 0 && ![...activeSkills].every(s => p.skills.includes(s))) return false;
  return true;
}

function render() {
  const filtered = people.filter(matches);
  document.getElementById('count').textContent = filtered.length;
  const container = document.getElementById('cards');

  if (!filtered.length) {
    container.innerHTML = '<div class="empty">🔍 Niemand gefunden — Filter anpassen?</div>';
    return;
  }

  const hasAll = p => ALL_SKILL_IDS.every(s => p.skills.includes(s));

  container.innerHTML = filtered.map(p => {
    const cityHtml = p.cities.length
      ? p.cities.map(c => `<span class="city-badge">${c}</span>`).join('')
      : '<span class="city-badge" style="font-style:italic">unbekannt</span>';

    const skillHtml = hasAll(p)
      ? `<span class="skill-tag" style="background:#1e2c07;color:#65a30d;border:1px solid #65a30d44">Flexibel · Alle Skills</span>`
      : (p.skills.map(s => {
          const cfg = SKILL_MAP[s];
          return cfg ? `<span class="skill-tag" style="background:${cfg.bg};color:${cfg.color}">${cfg.label}</span>` : '';
        }).join('') || '<span style="color:#555;font-size:0.75rem;font-style:italic">keine Skills</span>');

    const contacts = [];
    if (p.handy) contacts.push(`📱 <a href="tel:${p.handy}">${p.handy}</a>`);
    if (p.email) contacts.push(`✉️ <a href="mailto:${p.email}">${p.email}</a>`);
    if (p.social) {
      const href = p.social.startsWith('http') ? p.social : `https://instagram.com/${p.social.replace(/^@/,'')}`;
      contacts.push(`🔗 <a href="${href}" target="_blank">${p.social}</a>`);
    }
    const contactHtml = contacts.length
      ? contacts.map(c => `<div class="contact-item">${c}</div>`).join('')
      : '<div class="contact-item" style="color:#555;font-style:italic;font-size:0.75rem">keine Kontaktdaten</div>';

    return `<div class="card">
      <button class="edit-btn" onclick="openEdit(${p.row})">✎ Bearbeiten</button>
      <div class="card-header">
        <div class="card-name">${p.name}${p.alias ? ` <span class="card-alias">(${p.alias})</span>` : ''}</div>
        <div class="city-badges">${cityHtml}</div>
      </div>
      <div class="card-skills">${skillHtml}</div>
      <div class="card-contacts">${contactHtml}</div>
    </div>`;
  }).join('');
}

// ── Edit-Modal ─────────────────────────────────────────────────────────────────
function buildEditSkillsGrid(person) {
  const grid = document.getElementById('editSkillsGrid');
  grid.innerHTML = '';
  SKILLS.forEach(skill => {
    const card = document.createElement('label');
    card.className = 'modal-skill-card' + (person.skills.includes(skill.id) ? ' selected' : '');
    card.innerHTML = `<input type="checkbox" id="e_skill_${skill.id}" ${person.skills.includes(skill.id) ? 'checked' : ''}>${skill.label}`;
    card.onclick = () => {
      const cb = card.querySelector('input');
      cb.checked = !cb.checked;
      card.classList.toggle('selected', cb.checked);
    };
    grid.appendChild(card);
  });
}

function toggleEditUeberall(cb) {
  const input = document.getElementById('e_staedte');
  if (cb.checked) {
    input.value = '';
    input.disabled = true;
    input.placeholder = 'überall';
  } else {
    input.disabled = false;
    input.placeholder = 'z.B. Leipzig oder Leipzig, Berlin';
  }
}

function openEdit(row) {
  const person = people.find(p => p.row === row);
  if (!person) return;
  editingRaw = person.raw;

  document.getElementById('editTitle').textContent = 'Bearbeiten: ' + person.name;
  document.getElementById('e_name').value = person.name;
  document.getElementById('e_alias').value = person.alias;

  const isUeberall = person.cities.length === 1 && person.cities[0] === 'überall';
  document.getElementById('e_ueberall').checked = isUeberall;
  document.getElementById('e_staedte').value = isUeberall ? '' : person.cities.join(', ');
  document.getElementById('e_staedte').disabled = isUeberall;
  document.getElementById('e_staedte').placeholder = isUeberall ? 'überall' : 'z.B. Leipzig oder Leipzig, Berlin';

  document.getElementById('e_handy').value = person.handy;
  document.getElementById('e_email').value = person.email;
  document.getElementById('e_social').value = person.social;
  document.getElementById('e_notizen').value = person.notizen;

  buildEditSkillsGrid(person);

  document.getElementById('editMsg').style.display = 'none';
  document.getElementById('editMsg').className = 'modal-msg';
  document.getElementById('editOverlay').classList.add('open');
}

function closeEdit() {
  document.getElementById('editOverlay').classList.remove('open');
  editingRaw = null;
}

async function saveEdit() {
  if (!editingRaw) return;
  const name = document.getElementById('e_name').value.trim();
  if (!name) {
    showEditError('Bitte Namen eintragen.');
    return;
  }

  const btn = document.getElementById('editSaveBtn');
  btn.disabled = true;
  btn.textContent = 'Speichere …';
  document.getElementById('editMsg').style.display = 'none';

  const selectedSkills = {};
  SKILLS.forEach(s => {
    selectedSkills[s.id] = document.getElementById('e_skill_' + s.id).checked ? 'Ja' : '';
  });

  // Spalten, die diese Oberfläche nicht zeigt, unverändert aus den Rohdaten übernehmen,
  // damit beim Speichern nichts überschrieben/gelöscht wird.
  const passthrough = {};
  PASSTHROUGH_COLS.forEach(col => { passthrough[col] = editingRaw[col] || ''; });

  const payload = {
    action: 'update',
    _row: editingRaw._row,
    Name:     name,
    Alias:    document.getElementById('e_alias').value.trim(),
    'Städte': document.getElementById('e_ueberall').checked ? 'überall' : document.getElementById('e_staedte').value.trim(),
    Handy:    document.getElementById('e_handy').value.trim(),
    Email:    document.getElementById('e_email').value.trim(),
    Social:   document.getElementById('e_social').value.trim(),
    ...selectedSkills,
    ...passthrough,
    Notizen:  document.getElementById('e_notizen').value.trim(),
  };

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      redirect: 'follow',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(payload),
    });

    let result;
    try { result = await res.json(); } catch(_) { result = { success: true }; }

    if (result.success !== false) {
      showEditSuccess('✓ Gespeichert!');
      // Lokale Daten aktualisieren, ohne komplett neu zu laden
      const idx = people.findIndex(p => p.row === editingRaw._row);
      if (idx !== -1) {
        const updatedRaw = { ...editingRaw, ...payload };
        delete updatedRaw.action;
        people[idx] = {
          raw: updatedRaw,
          row: editingRaw._row,
          name: payload.Name,
          alias: payload.Alias,
          cities: payload['Städte'].toLowerCase() === 'überall' ? ['überall'] : payload['Städte'].split(',').map(c => c.trim()).filter(Boolean),
          handy: payload.Handy.replace(/\s+/g,''),
          email: payload.Email,
          social: payload.Social,
          skills: ALL_SKILL_IDS.filter(s => selectedSkills[s] === 'Ja'),
          notizen: payload.Notizen,
        };
      }
      buildFilters();
      render();
      setTimeout(closeEdit, 700);
    } else {
      showEditError('Fehler: ' + (result.error || 'Unbekannter Fehler.'));
    }
  } catch (err) {
    showEditError('Verbindungsfehler. Bitte nochmal versuchen.');
    console.error(err);
  } finally {
    btn.disabled = false;
    btn.textContent = 'Speichern';
  }
}

function showEditSuccess(msg) {
  const el = document.getElementById('editMsg');
  el.textContent = msg;
  el.className = 'modal-msg success';
}
function showEditError(msg) {
  const el = document.getElementById('editMsg');
  el.textContent = '⚠ ' + msg;
  el.className = 'modal-msg error';
}

// Modal schließen bei Klick auf Hintergrund
document.getElementById('editOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeEdit();
});

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  people = await loadData();
  const now = new Date().toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit' });
  document.getElementById('syncInfo').textContent = `${people.length} Personen · ${now}`;
  buildFilters();
  render();
})();
</script>
</body>
